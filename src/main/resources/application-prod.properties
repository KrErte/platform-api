# === Prod Profile ===
# All values MUST come from environment variables — no defaults
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

jwt.secret=${JWT_SECRET}

app.cors.allowed-origins=${CORS_ORIGINS}

# === eID (Smart-ID & Mobile-ID) — MUST be set for production ===
eid.smart-id.relying-party-uuid=${SMARTID_RP_UUID}
eid.smart-id.relying-party-name=${SMARTID_RP_NAME}
eid.smart-id.host-url=${SMARTID_HOST_URL:https://rp-api.smart-id.com/v2/}
eid.mobile-id.relying-party-uuid=${MOBILEID_RP_UUID}
eid.mobile-id.relying-party-name=${MOBILEID_RP_NAME}
eid.mobile-id.host-url=${MOBILEID_HOST_URL:https://mid.sk.ee/mid-api}

# === Vault Escrow — MUST be set for production ===
app.vault-escrow.master-key=${VAULT_ESCROW_MASTER_KEY}

# Disable SQL logging
spring.jpa.show-sql=false

# Logging
logging.level.ee.parandiplaan=INFO
logging.level.org.springframework.security=WARN
