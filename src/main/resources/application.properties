server.port=8080

# === Database ===
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:parandiplaan}
spring.datasource.username=${POSTGRES_USER:ppuser}
spring.datasource.password=${POSTGRES_PASSWORD:pppass}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# === Flyway ===
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# === HikariCP ===
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# === JWT ===
jwt.secret=${JWT_SECRET:DevSecretKeyThatIsAtLeast256BitsLongForHmacSHA256Algorithm}
jwt.access-expiration-ms=900000
jwt.refresh-expiration-days=7

# === CORS ===
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# === Actuator ===
management.endpoints.web.exposure.include=health,info

# === Resend Email ===
resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:noreply@parandiplaan.ee}

# === LemonSqueezy ===
lemonsqueezy.api-key=${LEMONSQUEEZY_API_KEY:}
lemonsqueezy.webhook-secret=${LEMONSQUEEZY_WEBHOOK_SECRET:}
lemonsqueezy.store-id=${LEMONSQUEEZY_STORE_ID:}
lemonsqueezy.plus-variant-id=${LEMONSQUEEZY_PLUS_VARIANT_ID:}
lemonsqueezy.family-variant-id=${LEMONSQUEEZY_FAMILY_VARIANT_ID:}

# === App ===
app.url=${APP_URL:http://localhost:8080}

# === Graceful Shutdown ===
server.shutdown=graceful
