server.port=8080

# === Database ===
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:parandiplaan}
spring.datasource.username=${POSTGRES_USER:ppuser}
spring.datasource.password=${POSTGRES_PASSWORD:pppass}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# === Flyway ===
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# === HikariCP ===
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# === JWT ===
jwt.secret=${JWT_SECRET:DevSecretKeyThatIsAtLeast256BitsLongForHmacSHA256Algorithm}
jwt.access-expiration-ms=900000
jwt.refresh-expiration-days=7

# === CORS ===
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# === Actuator ===
management.endpoints.web.exposure.include=health,info

# === Graceful Shutdown ===
server.shutdown=graceful
