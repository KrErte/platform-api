<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seaded — Pärandiplaan</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="stylesheet" href="/assets/auth.css">
    <link rel="stylesheet" href="/assets/settings.css">
</head>
<body>
    <div class="grain"></div>

    <nav>
        <div class="nav-inner">
            <a href="/dashboard.html" class="logo">
                <span class="logo-icon">🌿</span>
                <span class="logo-text">Pärandiplaan</span>
            </a>
            <div class="nav-user">
                <span class="nav-user-name" id="nav-name"></span>
                <a href="/settings.html" class="nav-settings-link" title="Seaded">&#9881;</a>
                <button class="btn-logout" onclick="logout()">Logi välja</button>
            </div>
        </div>
    </nav>

    <main class="settings-page">
        <h1>Seaded</h1>

        <!-- Profile Section -->
        <div class="settings-card">
            <h2>Profiil</h2>
            <div id="profile-message"></div>
            <form id="profile-form">
                <div class="settings-grid">
                    <div class="form-group">
                        <label for="profile-name">Täisnimi</label>
                        <input type="text" id="profile-name" required>
                    </div>
                    <div class="form-group">
                        <label for="profile-phone">Telefon</label>
                        <input type="text" id="profile-phone" placeholder="+372 ...">
                    </div>
                    <div class="form-group">
                        <label for="profile-dob">Sünnikuupäev</label>
                        <input type="date" id="profile-dob">
                    </div>
                    <div class="form-group">
                        <label for="profile-country">Riik</label>
                        <select id="profile-country">
                            <option value="EST">Eesti</option>
                            <option value="LVA">Läti</option>
                            <option value="LTU">Leedu</option>
                            <option value="FIN">Soome</option>
                            <option value="SWE">Rootsi</option>
                            <option value="DEU">Saksamaa</option>
                            <option value="GBR">Suurbritannia</option>
                            <option value="USA">Ameerika Ühendriigid</option>
                            <option value="OTHER">Muu</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="profile-language">Keel</label>
                        <select id="profile-language">
                            <option value="et">Eesti</option>
                            <option value="en">English</option>
                        </select>
                    </div>
                </div>
                <div class="settings-actions">
                    <button type="submit" class="btn btn-primary btn-sm" id="profile-save-btn">Salvesta</button>
                </div>
            </form>
        </div>

        <!-- Security Section -->
        <div class="settings-card">
            <h2>Turvalisus</h2>

            <!-- Change Password -->
            <h3 style="font-size:1rem;font-weight:600;color:var(--green-900);margin-bottom:1rem;">Parooli muutmine</h3>
            <div class="settings-warning">
                Parooli muutmisel krüpteeritakse kõik tresori andmed uuesti uue parooliga. See võib hetke aega võtta.
            </div>
            <div id="password-message"></div>
            <form id="password-form">
                <div class="settings-grid">
                    <div class="form-group">
                        <label for="current-password">Praegune parool</label>
                        <input type="password" id="current-password" required>
                    </div>
                    <div class="form-group">
                        <label for="new-password">Uus parool</label>
                        <input type="password" id="new-password" minlength="8" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Kinnita uus parool</label>
                        <input type="password" id="confirm-password" minlength="8" required>
                    </div>
                </div>
                <div class="settings-actions">
                    <button type="submit" class="btn btn-primary btn-sm" id="password-save-btn">Muuda parool</button>
                </div>
            </form>

            <hr style="border:none;border-top:1px solid var(--green-200);margin:2rem 0;">

            <!-- 2FA -->
            <h3 style="font-size:1rem;font-weight:600;color:var(--green-900);margin-bottom:1rem;">Kaheastmeline autentimine (2FA)</h3>
            <div id="twofa-message"></div>
            <div class="twofa-status">
                <span>Staatus:</span>
                <span class="twofa-badge" id="twofa-badge">Laadin...</span>
            </div>

            <div id="twofa-setup-section"></div>
        </div>

        <!-- Subscription Section -->
        <div class="settings-card">
            <h2>Tellimus</h2>
            <div id="subscription-section">
                <div class="skeleton skeleton-line" style="width:60%"></div>
                <div class="skeleton skeleton-line short" style="width:40%"></div>
            </div>
        </div>
    </main>

    <script>
        // Auth guard
        var token = localStorage.getItem('accessToken');
        if (!token) {
            window.location.href = '/login.html';
        }

        var userName = localStorage.getItem('userName') || '';
        document.getElementById('nav-name').textContent = userName;

        var headers = {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
        };

        function logout() {
            localStorage.removeItem('accessToken');
            localStorage.removeItem('refreshToken');
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userName');
            sessionStorage.removeItem('vaultKey');
            window.location.href = '/login.html';
        }

        function handleAuthError(res) {
            if (res.status === 401 || res.status === 403) {
                logout();
                return true;
            }
            return false;
        }

        function showMessage(elementId, text, isError) {
            var el = document.getElementById(elementId);
            el.innerHTML = '<div class="' + (isError ? 'settings-error' : 'settings-success') + '">' + text + '</div>';
            setTimeout(function() { el.innerHTML = ''; }, 5000);
        }

        // ===== Profile =====
        async function loadProfile() {
            try {
                var res = await fetch('/api/v1/users/me', { headers: headers });
                if (handleAuthError(res)) return;
                if (!res.ok) return;
                var data = await res.json();

                document.getElementById('profile-name').value = data.fullName || '';
                document.getElementById('profile-phone').value = data.phone || '';
                document.getElementById('profile-dob').value = data.dateOfBirth || '';
                document.getElementById('profile-country').value = data.country || 'EST';
                document.getElementById('profile-language').value = data.language || 'et';

                // Update 2FA status
                updateTwofaStatus(data.totpEnabled);
            } catch (e) {
                console.error('Profile load failed:', e);
            }
        }

        document.getElementById('profile-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            var btn = document.getElementById('profile-save-btn');
            btn.disabled = true;
            btn.textContent = 'Salvestamine...';

            try {
                var body = {
                    fullName: document.getElementById('profile-name').value.trim(),
                    phone: document.getElementById('profile-phone').value.trim() || null,
                    dateOfBirth: document.getElementById('profile-dob').value || null,
                    country: document.getElementById('profile-country').value,
                    language: document.getElementById('profile-language').value
                };

                var res = await fetch('/api/v1/users/me', {
                    method: 'PUT',
                    headers: headers,
                    body: JSON.stringify(body)
                });
                if (handleAuthError(res)) return;

                if (!res.ok) {
                    var err = await res.json().catch(function() { return {}; });
                    throw new Error(err.message || 'Salvestamine ebaõnnestus');
                }

                var data = await res.json();
                localStorage.setItem('userName', data.fullName);
                document.getElementById('nav-name').textContent = data.fullName;
                showMessage('profile-message', 'Profiil uuendatud!', false);
            } catch (err) {
                showMessage('profile-message', err.message, true);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Salvesta';
            }
        });

        // ===== Password Change =====
        document.getElementById('password-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            var currentPassword = document.getElementById('current-password').value;
            var newPassword = document.getElementById('new-password').value;
            var confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                showMessage('password-message', 'Uued paroolid ei ühti', true);
                return;
            }

            if (newPassword.length < 8) {
                showMessage('password-message', 'Parool peab olema vähemalt 8 tähemärki', true);
                return;
            }

            var btn = document.getElementById('password-save-btn');
            btn.disabled = true;
            btn.textContent = 'Muutmine...';

            try {
                var res = await fetch('/api/v1/auth/change-password', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({
                        currentPassword: currentPassword,
                        newPassword: newPassword
                    })
                });
                if (handleAuthError(res)) return;

                if (!res.ok) {
                    var err = await res.json().catch(function() { return {}; });
                    throw new Error(err.message || 'Parooli muutmine ebaõnnestus');
                }

                var data = await res.json();

                // Update tokens and vault key
                localStorage.setItem('accessToken', data.accessToken);
                localStorage.setItem('refreshToken', data.refreshToken);
                sessionStorage.setItem('vaultKey', newPassword);
                token = data.accessToken;
                headers['Authorization'] = 'Bearer ' + token;

                document.getElementById('password-form').reset();
                showMessage('password-message', 'Parool muudetud ja tresori andmed uuesti krüpteeritud!', false);
            } catch (err) {
                showMessage('password-message', err.message, true);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Muuda parool';
            }
        });

        // ===== 2FA =====
        var totpEnabled = false;

        function updateTwofaStatus(enabled) {
            totpEnabled = enabled;
            var badge = document.getElementById('twofa-badge');

            if (enabled) {
                badge.className = 'twofa-badge active';
                badge.textContent = 'Aktiivne';
                renderTwofaDisable();
            } else {
                badge.className = 'twofa-badge inactive';
                badge.textContent = 'Mitteaktiivne';
                renderTwofaSetup();
            }
        }

        function renderTwofaSetup() {
            var section = document.getElementById('twofa-setup-section');
            section.innerHTML =
                '<button class="btn btn-primary btn-sm" onclick="startTwofaSetup()">Seadista 2FA</button>';
        }

        function renderTwofaDisable() {
            var section = document.getElementById('twofa-setup-section');
            section.innerHTML =
                '<p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:1rem;">2FA on aktiivne. Deaktiveerimiseks sisesta kood oma autentimisrakendusest.</p>' +
                '<div class="twofa-code-input">' +
                    '<input type="text" id="twofa-disable-code" placeholder="000000" maxlength="6" inputmode="numeric" pattern="[0-9]{6}">' +
                    '<button class="btn btn-ghost btn-sm" onclick="disableTwofa()">Deaktiveeri</button>' +
                '</div>';
        }

        async function startTwofaSetup() {
            var section = document.getElementById('twofa-setup-section');
            section.innerHTML = '<p style="color:var(--text-muted);font-size:0.9rem;">Laadin QR koodi...</p>';

            try {
                var res = await fetch('/api/v1/auth/2fa/setup', {
                    method: 'POST',
                    headers: headers
                });
                if (handleAuthError(res)) return;
                if (!res.ok) throw new Error('2FA seadistamine ebaõnnestus');

                var data = await res.json();

                section.innerHTML =
                    '<div class="twofa-qr">' +
                        '<p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:0.75rem;">Skänni see QR kood oma autentimisrakendusega (Google Authenticator, Authy vms):</p>' +
                        '<img src="' + data.qrCodeUrl + '" alt="2FA QR kood">' +
                    '</div>' +
                    '<div class="twofa-code-input">' +
                        '<input type="text" id="twofa-enable-code" placeholder="000000" maxlength="6" inputmode="numeric" pattern="[0-9]{6}">' +
                        '<button class="btn btn-primary btn-sm" onclick="enableTwofa()">Aktiveeri</button>' +
                        '<button class="btn btn-ghost btn-sm" onclick="renderTwofaSetup()">Tühista</button>' +
                    '</div>';
            } catch (err) {
                showMessage('twofa-message', err.message, true);
                renderTwofaSetup();
            }
        }

        async function enableTwofa() {
            var code = document.getElementById('twofa-enable-code').value.trim();
            if (!code || code.length !== 6) {
                showMessage('twofa-message', 'Sisesta 6-kohaline kood', true);
                return;
            }

            try {
                var res = await fetch('/api/v1/auth/2fa/enable', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ code: code })
                });
                if (handleAuthError(res)) return;
                if (!res.ok) {
                    var err = await res.json().catch(function() { return {}; });
                    throw new Error(err.message || '2FA aktiveerimine ebaõnnestus');
                }

                showMessage('twofa-message', '2FA on nüüd aktiivne!', false);
                updateTwofaStatus(true);
            } catch (err) {
                showMessage('twofa-message', err.message, true);
            }
        }

        async function disableTwofa() {
            var code = document.getElementById('twofa-disable-code').value.trim();
            if (!code || code.length !== 6) {
                showMessage('twofa-message', 'Sisesta 6-kohaline kood', true);
                return;
            }

            try {
                var res = await fetch('/api/v1/auth/2fa/disable', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ code: code })
                });
                if (handleAuthError(res)) return;
                if (!res.ok) {
                    var err = await res.json().catch(function() { return {}; });
                    throw new Error(err.message || '2FA deaktiveerimine ebaõnnestus');
                }

                showMessage('twofa-message', '2FA deaktiveeritud!', false);
                updateTwofaStatus(false);
            } catch (err) {
                showMessage('twofa-message', err.message, true);
            }
        }

        // ===== Subscription =====
        async function loadSubscription() {
            try {
                var res = await fetch('/api/v1/subscription', { headers: headers });
                if (handleAuthError(res)) return;
                if (!res.ok) return;
                var sub = await res.json();

                var container = document.getElementById('subscription-section');
                var planNames = { TRIAL: 'Prooviperiood', PLUS: 'Plus', FAMILY: 'Perekond', NONE: 'Puudub' };
                var planClass = (sub.plan || 'none').toLowerCase();

                var html = '<div class="sub-card-info">' +
                    '<span class="sub-plan-badge ' + planClass + '">' + (planNames[sub.plan] || sub.plan) + '</span>' +
                '</div>';

                if (sub.trialDaysRemaining !== null && sub.trialDaysRemaining !== undefined) {
                    html += '<p class="sub-detail-text"><strong>' + sub.trialDaysRemaining + '</strong> prooviperioodi päeva jäänud</p>';
                }

                if (sub.currentPeriodEnd) {
                    var endDate = new Date(sub.currentPeriodEnd);
                    html += '<p class="sub-detail-text">Kehtib kuni <strong>' + endDate.toLocaleDateString('et-EE') + '</strong></p>';
                }

                // Upgrade cards (only if not on PLUS/FAMILY)
                if (sub.plan !== 'PLUS' && sub.plan !== 'FAMILY') {
                    html += '<div class="sub-upgrade-grid">' +
                        '<div class="sub-upgrade-card">' +
                            '<div class="plan-name">Plus</div>' +
                            '<div class="plan-price">4.99€ <span>/kuu</span></div>' +
                            '<button class="btn btn-primary btn-sm" onclick="checkout(\'PLUS\')">Uuenda</button>' +
                        '</div>' +
                        '<div class="sub-upgrade-card">' +
                            '<div class="plan-name">Perekond</div>' +
                            '<div class="plan-price">9.99€ <span>/kuu</span></div>' +
                            '<button class="btn btn-primary btn-sm" onclick="checkout(\'FAMILY\')">Uuenda</button>' +
                        '</div>' +
                    '</div>';
                } else if (sub.plan === 'PLUS') {
                    html += '<div class="sub-upgrade-grid">' +
                        '<div class="sub-upgrade-card">' +
                            '<div class="plan-name">Perekond</div>' +
                            '<div class="plan-price">9.99€ <span>/kuu</span></div>' +
                            '<button class="btn btn-primary btn-sm" onclick="checkout(\'FAMILY\')">Uuenda</button>' +
                        '</div>' +
                    '</div>';
                }

                container.innerHTML = html;
            } catch (e) {
                console.error('Subscription load failed:', e);
            }
        }

        async function checkout(plan) {
            try {
                var res = await fetch('/api/v1/subscription/checkout', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ plan: plan })
                });
                if (handleAuthError(res)) return;
                if (!res.ok) {
                    var err = await res.json().catch(function() { return {}; });
                    alert(err.message || 'Makse alustamine ebaõnnestus');
                    return;
                }
                var data = await res.json();
                if (data.checkoutUrl) {
                    window.location.href = data.checkoutUrl;
                }
            } catch (e) {
                console.error('Checkout failed:', e);
                alert('Makse alustamine ebaõnnestus');
            }
        }

        // ===== Init =====
        loadProfile();
        loadSubscription();
    </script>
</body>
</html>
