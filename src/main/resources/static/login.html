<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logi sisse — Pärandiplaan</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="stylesheet" href="/assets/auth.css">
</head>
<body>
    <div class="grain"></div>

    <nav>
        <div class="nav-inner">
            <a href="/" class="logo">
                <span class="logo-icon">🌿</span>
                <span class="logo-text">Pärandiplaan</span>
            </a>
            <div class="nav-links">
                <a href="/register.html" class="btn btn-sm btn-primary">Proovi tasuta</a>
            </div>
        </div>
    </nav>

    <main class="auth-page">
        <div class="auth-card">
            <h1>Tere tulemast tagasi</h1>
            <p class="auth-subtitle">Logi sisse oma Pärandiplaani</p>

            <div id="error-message" class="auth-error" style="display: none;"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">E-posti aadress</label>
                    <input type="email" id="email" name="email" placeholder="sinu@email.ee" required>
                </div>
                <div class="form-group">
                    <label for="password">Parool</label>
                    <input type="password" id="password" name="password" placeholder="Sinu parool" required autocomplete="off">
                </div>
                <div id="totp-group" class="form-group" style="display: none;">
                    <label for="totpCode">2FA kood</label>
                    <input type="text" id="totpCode" name="totpCode" placeholder="6-kohaline kood" maxlength="6" inputmode="numeric" pattern="[0-9]{6}">
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-full" id="submit-btn">Logi sisse</button>
            </form>

            <p class="auth-footer" style="margin-bottom:0.5rem;">
                <a href="#" onclick="showForgotPassword(event)" style="font-size:0.85rem;">Unustasid parooli?</a>
            </p>
            <p class="auth-footer">
                Pole veel kontot? <a href="/register.html">Proovi 14 päeva tasuta</a>
            </p>

            <!-- Forgot Password Section -->
            <div id="forgot-section" style="display:none; margin-top:1.5rem; padding-top:1.5rem; border-top:1px solid var(--green-200);">
                <h2 style="font-size:1.15rem; font-weight:700; color:var(--green-900); margin-bottom:0.5rem;">Parooli taastamine</h2>
                <p style="font-size:0.85rem; color:var(--text-secondary); margin-bottom:1rem;">Sisesta oma e-posti aadress ja saadame sulle lähtestamislingi.</p>
                <div id="forgot-message" style="display:none;"></div>
                <form id="forgot-form">
                    <div class="form-group">
                        <label for="forgot-email">E-posti aadress</label>
                        <input type="email" id="forgot-email" placeholder="sinu@email.ee" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full" id="forgot-btn">Saada lähtestamislink</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        const form = document.getElementById('login-form');
        const errorEl = document.getElementById('error-message');
        const submitBtn = document.getElementById('submit-btn');
        const totpGroup = document.getElementById('totp-group');

        // Clear form on page load to prevent stale password after logout
        form.reset();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const totpCode = document.getElementById('totpCode').value.trim() || null;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Login sisse...';

            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, totpCode })
                });

                const data = await response.json();

                if (!response.ok) {
                    // Show 2FA field if needed
                    if (data.message && data.message.includes('2FA')) {
                        totpGroup.style.display = 'block';
                        document.getElementById('totpCode').focus();
                        throw new Error('Sisesta 2FA kood oma autentimisrakendusest');
                    }
                    throw new Error(data.message || 'Sisselogimine ebaõnnestus');
                }

                // Store tokens
                localStorage.setItem('accessToken', data.accessToken);
                localStorage.setItem('refreshToken', data.refreshToken);
                localStorage.setItem('userEmail', data.email);
                localStorage.setItem('userName', data.fullName);
                sessionStorage.setItem('vaultKey', password);

                window.location.href = '/dashboard.html';

            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Logi sisse';
            }
        });
        // Forgot Password
        function showForgotPassword(e) {
            e.preventDefault();
            var section = document.getElementById('forgot-section');
            section.style.display = section.style.display === 'none' ? '' : 'none';
        }

        var forgotForm = document.getElementById('forgot-form');
        forgotForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            var msgEl = document.getElementById('forgot-message');
            msgEl.style.display = 'none';

            var email = document.getElementById('forgot-email').value.trim();
            var btn = document.getElementById('forgot-btn');
            btn.disabled = true;
            btn.textContent = 'Saatmine...';

            try {
                var response = await fetch('/api/v1/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                var data = await response.json();

                msgEl.className = 'auth-success';
                msgEl.textContent = 'Kui see e-posti aadress on registreeritud, saadame lähtestamislingi. Kontrolli oma postkasti.';
                msgEl.style.display = 'block';
                forgotForm.querySelector('button').style.display = 'none';

            } catch (err) {
                msgEl.className = 'auth-error';
                msgEl.textContent = 'Midagi läks valesti. Proovi uuesti.';
                msgEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Saada lähtestamislink';
            }
        });
    </script>
</body>
</html>
