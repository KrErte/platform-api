<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registreeru — Pärandiplaan</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1B4332">
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="stylesheet" href="/assets/auth.css">
</head>
<body>
    <a href="#register-content" class="skip-nav">Liigu põhisisu juurde</a>
    <div class="grain"></div>

    <nav aria-label="Peamine navigatsioon">
        <div class="nav-inner">
            <a href="/" class="logo">
                <span class="logo-icon">🌿</span>
                <span class="logo-text">Pärandiplaan</span>
            </a>
            <div class="nav-links">
                <a href="/login.html" class="btn btn-sm" data-i18n="nav.login">Logi sisse</a>
            </div>
        </div>
    </nav>

    <main class="auth-page" id="register-content">
        <div class="auth-card">
            <h1 data-i18n="auth.registerSubtitle">Alusta prooviperioodi</h1>
            <p class="auth-subtitle" data-i18n="auth.registerNote">14 päeva tasuta. Krediitkaardi pole vaja.</p>

            <div id="error-message" class="auth-error" style="display: none;"></div>
            <div id="success-message" class="auth-success" style="display: none;"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="fullName" data-i18n="auth.fullName">Täisnimi</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Nimi Perekonnanimi" required data-i18n="auth.fullNamePlaceholder" data-i18n-attr="placeholder">
                </div>
                <div class="form-group">
                    <label for="email" data-i18n="auth.email">E-posti aadress</label>
                    <input type="email" id="email" name="email" placeholder="sinu@email.ee" required data-i18n="auth.emailPlaceholder" data-i18n-attr="placeholder">
                </div>
                <div class="form-group">
                    <label for="password" data-i18n="auth.password">Parool</label>
                    <input type="password" id="password" name="password" placeholder="Vähemalt 8 tähemärki" required minlength="8" data-i18n="auth.passwordPlaceholder" data-i18n-attr="placeholder">
                </div>
                <div class="form-group">
                    <label for="confirmPassword" data-i18n="auth.confirmPassword">Kinnita parool</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Sisesta parool uuesti" required minlength="8" data-i18n="auth.confirmPasswordPlaceholder" data-i18n-attr="placeholder">
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-full" id="submit-btn" data-i18n="auth.registerBtn">Loo konto</button>
            </form>

            <p class="auth-footer">
                <span data-i18n="auth.hasAccount">Juba on konto?</span> <a href="/login.html" data-i18n="auth.hasAccountLink">Logi sisse</a>
            </p>
            <p class="auth-terms">
                Konto loomisega nõustud meie <a href="/tingimused.html">kasutustingimuste</a> ja <a href="/privaatsuspoliitika.html">privaatsuspoliitikaga</a>.
            </p>
        </div>
    </main>

    <script src="/assets/cookie-consent.js"></script>
    <script>
        const form = document.getElementById('register-form');
        const errorEl = document.getElementById('error-message');
        const successEl = document.getElementById('success-message');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                errorEl.textContent = 'Paroolid ei ühti';
                errorEl.style.display = 'block';
                return;
            }

            if (password.length < 8) {
                errorEl.textContent = 'Parool peab olema vähemalt 8 tähemärki';
                errorEl.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Loon kontot...';

            try {
                const response = await fetch('/api/v1/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Registreerimine ebaõnnestus');
                }

                // Store tokens
                localStorage.setItem('accessToken', data.accessToken);
                localStorage.setItem('refreshToken', data.refreshToken);
                localStorage.setItem('userEmail', data.email);
                localStorage.setItem('userName', data.fullName);
                sessionStorage.setItem('vaultKey', password);

                successEl.textContent = 'Konto loodud! Suuname sind edasi...';
                successEl.style.display = 'block';

                setTimeout(() => {
                    window.location.href = '/dashboard.html';
                }, 1500);

            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Loo konto';
            }
        });
    </script>
    <script src="/assets/i18n.js"></script>
</body>
</html>
