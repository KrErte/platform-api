<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Töölaud — Pärandiplaan</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="stylesheet" href="/assets/dashboard.css">
</head>
<body>
    <a href="#main-content" class="skip-nav">Otse sisu juurde</a>
    <div class="grain"></div>

    <header>
        <nav>
            <div class="nav-inner">
                <a href="/dashboard.html" class="logo">
                    <span class="logo-icon">🌿</span>
                    <span class="logo-text">Pärandiplaan</span>
                </a>
                <div class="nav-user">
                    <span class="nav-user-name" id="nav-name"></span>
                    <a href="/settings.html" class="nav-settings-link" title="Seaded">&#9881;</a>
                    <button class="btn-logout" onclick="logout()">Logi välja</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="dashboard" id="main-content">
        <!-- Greeting + Progress -->
        <section class="greeting-section">
            <div class="greeting-text">
                <h1 id="greeting-title">Tere!</h1>
                <p class="greeting-sub" id="greeting-sub">Sinu Pärandiplaan on pooleli</p>
            </div>
            <div class="dash-progress-ring">
                <svg viewBox="0 0 120 120">
                    <circle class="progress-bg" cx="60" cy="60" r="50" />
                    <circle class="progress-fill" id="progress-circle" cx="60" cy="60" r="50" />
                </svg>
                <div class="dash-progress-text">
                    <span class="pct" id="progress-pct">0</span><span class="pct-sign">%</span>
                    <span class="pct-label">korrastatud</span>
                </div>
            </div>
        </section>

        <!-- Quick Actions -->
        <div class="quick-actions">
            <a href="/vault.html" class="quick-action-btn"><span class="qa-icon">+</span> Lisa kirje</a>
            <a href="/usaldusisikud.html" class="quick-action-btn"><span class="qa-icon">&#128100;</span> Lisa kontakt</a>
            <button class="quick-action-btn" onclick="exportPdf()"><span class="qa-icon">&#128196;</span> Ekspordi PDF</button>
            <a href="/activity.html" class="quick-action-btn"><span class="qa-icon">&#128337;</span> Tegevuslogi</a>
        </div>

        <!-- Vault Categories with progress bars -->
        <h2 class="dash-section-title">Tresori kategooriad</h2>
        <div class="vault-grid" id="vault-grid">
            <div class="vault-card skeleton" style="height:140px"></div>
            <div class="vault-card skeleton" style="height:140px"></div>
            <div class="vault-card skeleton" style="height:140px"></div>
            <div class="vault-card skeleton" style="height:140px"></div>
            <div class="vault-card skeleton" style="height:140px"></div>
        </div>

        <!-- Suggestions -->
        <div id="suggestions-section" style="display:none">
            <h2 class="dash-section-title">Soovitused</h2>
            <div class="suggestions-list" id="suggestions-list"></div>
        </div>

        <!-- Activity + Contacts + Subscription -->
        <div class="dash-columns-3">
            <div class="dash-card">
                <h2 class="dash-section-title">Viimane tegevus <a href="/activity.html" style="font-size:0.8rem;font-weight:600;color:var(--green-700);text-decoration:none;margin-left:0.5rem">Vaata k&otilde;iki →</a></h2>
                <div id="recent-activity">
                    <div class="skeleton skeleton-line"></div>
                    <div class="skeleton skeleton-line short"></div>
                </div>
            </div>
            <div class="dash-card">
                <h2 class="dash-section-title">Usalduskontaktid <a href="/usaldusisikud.html" style="font-size:0.8rem;font-weight:600;color:var(--green-700);text-decoration:none;margin-left:0.5rem">Halda →</a></h2>
                <ul class="contacts-list" id="contacts-list">
                    <li class="skeleton skeleton-line"></li>
                    <li class="skeleton skeleton-line short"></li>
                </ul>
            </div>
            <div class="dash-card">
                <h2 class="dash-section-title">Tellimus</h2>
                <div id="subscription-info">
                    <div class="skeleton skeleton-line"></div>
                    <div class="skeleton skeleton-line short"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Auth guard
        const token = localStorage.getItem('accessToken');
        if (!token) {
            window.location.href = '/login.html';
        }

        const userName = localStorage.getItem('userName') || '';
        const headers = {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
        };

        // Set nav name
        document.getElementById('nav-name').textContent = userName;
        document.getElementById('greeting-title').textContent = 'Tere, ' + (userName.split(' ')[0] || 'kasutaja') + '!';

        function logout() {
            localStorage.removeItem('accessToken');
            localStorage.removeItem('refreshToken');
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userName');
            sessionStorage.removeItem('vaultKey');
            window.location.href = '/login.html';
        }

        function handleAuthError(res) {
            if (res.status === 401 || res.status === 403) {
                logout();
                return true;
            }
            return false;
        }

        // Load progress
        async function loadProgress() {
            try {
                const res = await fetch('/api/v1/progress', { headers });
                if (handleAuthError(res)) return;
                if (!res.ok) return;
                const data = await res.json();

                const pct = Math.round(data.progressPercentage || 0);
                const circle = document.getElementById('progress-circle');
                const circumference = 2 * Math.PI * 50;
                circle.style.strokeDasharray = circumference;
                circle.style.strokeDashoffset = circumference - (pct / 100) * circumference;

                // Animate number
                const pctEl = document.getElementById('progress-pct');
                let current = 0;
                const step = Math.max(1, Math.floor(pct / 30));
                const interval = setInterval(() => {
                    current = Math.min(current + step, pct);
                    pctEl.textContent = current;
                    if (current >= pct) clearInterval(interval);
                }, 30);

                // Update subtitle
                const sub = document.getElementById('greeting-sub');
                if (pct === 100) {
                    sub.textContent = 'Suurepärane! Sinu Pärandiplaan on täielikult korrastatud.';
                } else if (pct >= 50) {
                    sub.textContent = 'Tubli! Sa oled juba üle poole tee läbinud.';
                } else if (pct > 0) {
                    sub.textContent = 'Hea algus! Jätka oma plaani täitmist.';
                } else {
                    sub.textContent = 'Alusta oma eluinfo korrastamist allpool olevatest kategooriatest.';
                }
            } catch (e) {
                console.error('Progress load failed:', e);
            }
        }

        // Load vault categories
        let dashCategories = [];

        async function loadCategories() {
            try {
                const res = await fetch('/api/v1/vault/categories', { headers });
                if (handleAuthError(res)) return;
                if (!res.ok) return;
                dashCategories = await res.json();

                const grid = document.getElementById('vault-grid');
                grid.innerHTML = dashCategories.map(cat => {
                    var pct = cat.entryCount > 0 ? Math.round((cat.completedCount / cat.entryCount) * 100) : 0;
                    return '<a href="/vault.html?category=' + cat.slug + '" class="vault-card">' +
                        '<span class="vault-icon">' + (cat.icon || '📁') + '</span>' +
                        '<span class="vault-name">' + cat.nameEt + '</span>' +
                        '<div class="vault-card-progress"><div class="vault-card-progress-fill" style="width:' + pct + '%"></div></div>' +
                        '<span class="vault-count">' + cat.completedCount + '/' + cat.entryCount + '</span>' +
                    '</a>';
                }).join('');

                // Load suggestions after categories are available
                loadSuggestions();
            } catch (e) {
                console.error('Categories load failed:', e);
            }
        }

        // Load trusted contacts
        async function loadContacts() {
            try {
                const res = await fetch('/api/v1/trusted-contacts', { headers });
                if (handleAuthError(res)) return;
                if (!res.ok) return;
                const contacts = await res.json();

                const list = document.getElementById('contacts-list');
                if (contacts.length === 0) {
                    list.innerHTML = '<li class="contacts-empty">Sul pole veel usalduskontakte lisatud.</li>';
                    return;
                }

                list.innerHTML = contacts.map(c => {
                    const initials = (c.fullName || '?').split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
                    const accepted = c.inviteAccepted;
                    return '<li class="contact-item">' +
                        '<div class="contact-info">' +
                            '<div class="contact-avatar">' + initials + '</div>' +
                            '<div>' +
                                '<div class="contact-name">' + c.fullName + '</div>' +
                                '<div class="contact-email">' + c.email + '</div>' +
                            '</div>' +
                        '</div>' +
                        '<span class="contact-badge ' + (accepted ? 'accepted' : 'pending') + '">' +
                            (accepted ? 'Kinnitatud' : 'Ootel') +
                        '</span>' +
                    '</li>';
                }).join('');
            } catch (e) {
                console.error('Contacts load failed:', e);
            }
        }

        // Load subscription
        async function loadSubscription() {
            try {
                const res = await fetch('/api/v1/subscription', { headers });
                if (handleAuthError(res)) return;
                if (!res.ok) return;
                const sub = await res.json();

                const container = document.getElementById('subscription-info');

                var planNames = { TRIAL: 'Prooviperiood', PLUS: 'Plus', FAMILY: 'Perekond', NONE: 'Puudub' };
                var statusNames = { ACTIVE: 'Aktiivne', PAST_DUE: 'Makse hilines', CANCELLED: 'Tühistatud', PAUSED: 'Peatatud', EXPIRED: 'Aegunud' };
                var statusClass = (sub.status || '').toLowerCase();

                var html = '<div class="sub-plan">' +
                    '<span class="sub-plan-name">' + (planNames[sub.plan] || sub.plan) + '</span>' +
                    '<span class="sub-status ' + statusClass + '">' + (statusNames[sub.status] || sub.status) + '</span>' +
                '</div>';

                if (sub.trialDaysRemaining !== null && sub.trialDaysRemaining !== undefined) {
                    html += '<p class="sub-detail"><strong>' + sub.trialDaysRemaining + '</strong> prooviperioodi päeva jäänud</p>';
                }

                if (sub.currentPeriodEnd) {
                    var endDate = new Date(sub.currentPeriodEnd);
                    html += '<p class="sub-detail">Kehtib kuni <strong>' + endDate.toLocaleDateString('et-EE') + '</strong></p>';
                }

                container.innerHTML = html;
            } catch (e) {
                console.error('Subscription load failed:', e);
            }
        }

        // Check onboarding status
        async function checkOnboarding() {
            try {
                const res = await fetch('/api/v1/users/me', { headers });
                if (handleAuthError(res)) return;
                if (!res.ok) return;
                const data = await res.json();
                if (!data.onboardingCompleted) {
                    window.location.href = '/onboarding.html';
                }
            } catch (e) {
                console.error('Onboarding check failed:', e);
            }
        }

        // PDF export
        async function exportPdf() {
            const vaultKey = sessionStorage.getItem('vaultKey');
            if (!vaultKey) {
                alert('Ava esmalt tresor, et eksportida PDF-i');
                window.location.href = '/vault.html';
                return;
            }
            try {
                const res = await fetch('/api/v1/vault/export/pdf', {
                    headers: { 'Authorization': 'Bearer ' + token, 'X-Encryption-Key': vaultKey }
                });
                if (handleAuthError(res)) return;
                if (!res.ok) { alert('Eksport ebaõnnestus'); return; }
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'parandiplaan-' + new Date().toISOString().split('T')[0] + '.pdf';
                a.click();
                URL.revokeObjectURL(url);
            } catch (e) {
                console.error('PDF export failed:', e);
                alert('Eksport ebaõnnestus');
            }
        }

        // Load suggestions
        async function loadSuggestions() {
            try {
                const res = await fetch('/api/v1/progress/suggestions', { headers });
                if (handleAuthError(res)) return;
                if (!res.ok) return;
                const suggestions = await res.json();

                if (!suggestions || suggestions.length === 0) return;

                const section = document.getElementById('suggestions-section');
                section.style.display = '';

                const list = document.getElementById('suggestions-list');
                list.innerHTML = suggestions.map(s => {
                    const cat = dashCategories.find(c => c.id === s.categoryId);
                    const slug = cat ? cat.slug : '';
                    const icon = cat ? (cat.icon || '📁') : '📁';
                    const typeClass = s.type === 'MISSING' ? 'missing' : s.type === 'INCOMPLETE' ? 'incomplete' : 'default';
                    const typeLabel = s.type === 'MISSING' ? 'Puuduv' : s.type === 'INCOMPLETE' ? 'Pooleli' : s.type;

                    return '<a href="/vault.html?category=' + slug + '" class="suggestion-card">' +
                        '<span class="suggestion-icon">' + icon + '</span>' +
                        '<div class="suggestion-info">' +
                            '<div class="suggestion-title">' + (s.titleEt || '') + '</div>' +
                            '<div class="suggestion-desc">' + (s.descriptionEt || '') + '</div>' +
                        '</div>' +
                        '<div class="suggestion-meta">' +
                            '<span class="suggestion-badge ' + typeClass + '">' + typeLabel + '</span>' +
                            '<span class="suggestion-points">+' + s.pointsToGain + ' punkti</span>' +
                        '</div>' +
                    '</a>';
                }).join('');
            } catch (e) {
                console.error('Suggestions load failed:', e);
            }
        }

        // Load recent activity
        var activityLabels = {
            LOGIN: 'Sisselogimine',
            ENTRY_CREATED: 'Kirje loodud',
            ENTRY_UPDATED: 'Kirje muudetud',
            ENTRY_DELETED: 'Kirje kustutatud',
            CONTACT_ADDED: 'Kontakt lisatud',
            CONTACT_REMOVED: 'Kontakt eemaldatud',
            HANDOVER_APPROVED: 'Üleandmine kinnitatud',
            HANDOVER_DENIED: 'Üleandmine keelatud'
        };

        async function loadRecentActivity() {
            try {
                var res = await fetch('/api/v1/audit/recent', { headers: headers });
                if (handleAuthError(res)) return;
                if (!res.ok) return;
                var items = await res.json();
                var container = document.getElementById('recent-activity');
                if (items.length === 0) {
                    container.innerHTML = '<p style="color:var(--text-muted);font-size:0.9rem;">Tegevusi pole veel.</p>';
                    return;
                }
                container.innerHTML = '<ul class="recent-activity-list">' + items.slice(0, 5).map(function(item) {
                    var label = activityLabels[item.action] || item.action;
                    var ago = timeAgo(item.createdAt);
                    return '<li class="recent-activity-item">' +
                        '<span class="ra-label">' + label + '</span>' +
                        (item.detail ? '<span class="ra-detail"> — ' + item.detail + '</span>' : '') +
                        '<span class="ra-time">' + ago + '</span>' +
                    '</li>';
                }).join('') + '</ul>';
            } catch (e) {
                console.error('Activity load failed:', e);
            }
        }

        function timeAgo(dateStr) {
            var diff = Date.now() - new Date(dateStr).getTime();
            var mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just nüüd';
            if (mins < 60) return mins + ' min tagasi';
            var hours = Math.floor(mins / 60);
            if (hours < 24) return hours + 'h tagasi';
            var days = Math.floor(hours / 24);
            return days + 'p tagasi';
        }

        // Load pending handovers badge
        async function loadHandoverBadge() {
            try {
                var res = await fetch('/api/v1/handover-requests/pending', { headers: headers });
                if (handleAuthError(res)) return;
                if (!res.ok) return;
                var pending = await res.json();
                if (pending.length > 0) {
                    var badge = document.createElement('span');
                    badge.className = 'nav-badge';
                    badge.textContent = pending.length;
                    badge.title = pending.length + ' ootel üleandmistaotlust';
                    var navUser = document.querySelector('.nav-user');
                    var settingsLink = navUser.querySelector('.nav-settings-link');
                    settingsLink.insertAdjacentElement('afterend', badge);
                }
            } catch (e) {
                // ignore
            }
        }

        // Load all data in parallel
        checkOnboarding();
        loadProgress();
        loadCategories();
        loadContacts();
        loadSubscription();
        loadRecentActivity();
        loadHandoverBadge();
    </script>
    <script src="/assets/session-guard.js"></script>
</body>
</html>
