# === H2 In-Memory Database (PostgreSQL mode) ===
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

# === Flyway (disabled — Hibernate generates schema, TestDataSeeder seeds categories) ===
spring.flyway.enabled=false

# === Allow test beans to override main beans ===
spring.main.allow-bean-definition-overriding=true

# === JWT ===
jwt.secret=TestSecretKeyThatIsAtLeast256BitsLongForHmacSHA256Algorithm!!
jwt.access-expiration-ms=900000
jwt.refresh-expiration-days=7

# === CORS ===
app.cors.allowed-origins=http://localhost:8080

# === Actuator ===
management.endpoints.web.exposure.include=health,info,metrics

# === Resend Email (disabled — no API key) ===
resend.api-key=
resend.from-email=test@parandiplaan.ee

# === LemonSqueezy (dummy values) ===
lemonsqueezy.api-key=test
lemonsqueezy.webhook-secret=test
lemonsqueezy.store-id=test
lemonsqueezy.plus-variant-id=test
lemonsqueezy.family-variant-id=test

# === App ===
app.url=http://localhost:8080

# === MinIO (overridden by TestMinioConfig mock) ===
minio.endpoint=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket=test-bucket

# === eID (Smart-ID & Mobile-ID demo) ===
eid.smart-id.relying-party-uuid=00000000-0000-4000-8000-000000000000
eid.smart-id.relying-party-name=DEMO
eid.smart-id.host-url=https://sid.demo.sk.ee/smart-id-rp/v2/
eid.mobile-id.relying-party-uuid=00000000-0000-0000-0000-000000000000
eid.mobile-id.relying-party-name=DEMO
eid.mobile-id.host-url=https://tsp.demo.sk.ee/mid-api

# === Rate Limiting (high limit for tests) ===
app.rate-limit.auth-requests-per-minute=1000
app.rate-limit.shared-vault-requests-per-minute=1000

# === Vault Escrow ===
app.vault-escrow.master-key=TestEscrowMasterKeyThatIsAtLeast32BytesLong!!
app.shared-vault.token-expiry-days=30

# === Multipart ===
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
