services:
  postgres:
    image: postgres:16-alpine
    container_name: parandiplaan-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ppuser
      POSTGRES_PASSWORD: pppass
      POSTGRES_DB: parandiplaan
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ppuser -d parandiplaan"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: parandiplaan-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_dev_data:/data

volumes:
  postgres_dev_data:
  minio_dev_data:
