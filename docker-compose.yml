services:
  postgres:
    image: postgres:16-alpine
    container_name: pp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ppuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pppass}
      POSTGRES_DB: ${POSTGRES_DB:-parandiplaan}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ppuser} -d ${POSTGRES_DB:-parandiplaan}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: pp-api
    restart: unless-stopped
    ports:
      - "80:8080"
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-parandiplaan}
      POSTGRES_USER: ${POSTGRES_USER:-ppuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pppass}
      JWT_SECRET: ${JWT_SECRET:-ChangeThisToASecureRandomStringAtLeast256BitsLong!!!}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4200}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
