services:
  postgres:
    image: postgres:16-alpine
    container_name: pp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ppuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pppass}
      POSTGRES_DB: ${POSTGRES_DB:-parandiplaan}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ppuser} -d ${POSTGRES_DB:-parandiplaan}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: pp-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: pp-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

  api:
    build: .
    container_name: pp-api
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-parandiplaan}
      POSTGRES_USER: ${POSTGRES_USER:-ppuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pppass}
      JWT_SECRET: ${JWT_SECRET:-ChangeThisToASecureRandomStringAtLeast256BitsLong!!!}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://parandiplaan.ee}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-onboarding@resend.dev}
      APP_URL: ${APP_URL:-https://parandiplaan.ee}
      LEMONSQUEEZY_API_KEY: ${LEMONSQUEEZY_API_KEY:-}
      LEMONSQUEEZY_WEBHOOK_SECRET: ${LEMONSQUEEZY_WEBHOOK_SECRET:-}
      LEMONSQUEEZY_STORE_ID: ${LEMONSQUEEZY_STORE_ID:-}
      LEMONSQUEEZY_PLUS_VARIANT_ID: ${LEMONSQUEEZY_PLUS_VARIANT_ID:-}
      LEMONSQUEEZY_FAMILY_VARIANT_ID: ${LEMONSQUEEZY_FAMILY_VARIANT_ID:-}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-parandiplaan-vault}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
